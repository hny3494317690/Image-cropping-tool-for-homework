<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>图片裁切与压缩工具</title>
    <link rel="stylesheet" href="./libs/cropper.min.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>图片裁切与压缩工具</h1>
        <p>支持 JPG / PNG / HEIC 等格式上传，裁切后导出 PNG，保证文件小于 200KB。</p>
      </header>

      <section class="panel">
        <label class="file-input">
          <input id="fileInput" type="file" accept="image/*,.heic,.heif" />
          <span>选择图片</span>
        </label>
        <div class="meta">
          <div id="fileInfo">未选择图片</div>
          <div id="outputInfo">导出尺寸与大小将在此显示</div>
        </div>
      </section>

      <section class="workspace">
        <div class="preview-area">
          <div class="area-title">裁切预览</div>
          <div class="image-wrap">
            <img id="sourceImage" alt="待裁切图片" />
          </div>
        </div>

        <div class="preview-area">
          <div class="area-title">导出预览</div>
          <div class="image-wrap output">
            <img id="outputImage" alt="导出图片预览" />
          </div>
          <a id="downloadBtn" class="button disabled" download>下载 PNG</a>
        </div>
      </section>

      <section class="actions">
        <button id="cropBtn" class="button primary">裁切并压缩</button>
        <button id="resetBtn" class="button">重置</button>
      </section>
    </main>

    <script src="./libs/heic2any.min.js"></script>
    <script src="./libs/cropper.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
