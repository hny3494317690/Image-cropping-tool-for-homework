<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>图片裁切与压缩工具</title>
    <link rel="icon" href="./favicon.ico" />
    <link rel="stylesheet" href="./libs/cropper.min.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div>
          <h1>图片裁切与压缩工具</h1>
          <p>支持 JPG / PNG / HEIC 等格式上传，裁切后导出 JPG，保证文件小于 300KB。</p>
        </div>
        <label class="theme-toggle" aria-label="切换深色模式">
          <input id="themeToggle" type="checkbox" />
          <span class="theme-track">
            <span class="theme-icon" aria-hidden="true">☀️</span>
            <span class="theme-icon" aria-hidden="true">🌙</span>
            <span class="theme-thumb"></span>
          </span>
        </label>
      </header>

      <section class="panel">
        <div class="panel-row">
          <label class="file-input success">
            <input id="fileInput" type="file" accept="image/*,.heic,.heif" />
            <span>选择图片</span>
          </label>
          <div class="actions inline-actions">
            <button id="cropBtn" class="button primary">裁切并压缩</button>
            <button id="resetBtn" class="button danger">重置</button>
          </div>
          <div class="meta">
            <div id="fileInfo">未选择图片</div>
            <div id="outputInfo">导出尺寸与大小将在此显示</div>
          </div>
        </div>
      </section>

      <section class="workspace">
        <div class="preview-area">
          <div class="area-title">裁切预览</div>
          <div class="image-wrap drop-zone" id="dropZone">
            <img id="sourceImage" alt="" />
          </div>
        </div>

        <div class="preview-area">
          <div class="area-title">导出预览</div>
          <a id="downloadBtn" class="button disabled" download>下载 JPG</a>
          <div class="image-wrap output">
            <img id="outputImage" alt="" />
          </div>
        </div>
      </section>

      
    </main>

    <script src="./libs/libheif-bundle.js"></script>
    <script src="./libs/cropper.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
