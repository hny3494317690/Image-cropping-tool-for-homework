<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>图片裁切与压缩工具</title>
    <link rel="icon" href="./favicon.ico" />
    <link rel="stylesheet" href="./libs/cropper.min.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div>
          <h1>图片裁切与压缩工具</h1>
          <p>支持 JPG / PNG / HEIC 等格式上传，裁切后导出 JPG，保证文件小于 300KB。</p>
        </div>
        <div class="header-actions">
          <label class="theme-toggle" aria-label="切换深色模式">
            <input id="themeToggle" type="checkbox" />
            <span class="theme-track">
              <span class="theme-icon" aria-hidden="true">☀️</span>
              <span class="theme-icon" aria-hidden="true">🌙</span>
              <span class="theme-thumb"></span>
            </span>
          </label>
          <a
            class="icon-link"
            href="https://github.com/hny3494317690/Image-cropping-tool-for-homework"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="GitHub"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 2C6.48 2 2 6.7 2 12.3c0 4.5 2.87 8.3 6.84 9.65.5.1.68-.22.68-.5v-1.9c-2.78.62-3.37-1.2-3.37-1.2-.45-1.17-1.1-1.48-1.1-1.48-.9-.63.07-.62.07-.62 1 .07 1.53 1.05 1.53 1.05.9 1.55 2.36 1.1 2.94.85.1-.66.36-1.1.65-1.36-2.22-.26-4.56-1.13-4.56-5.05 0-1.12.39-2.04 1.03-2.76-.1-.26-.45-1.3.1-2.7 0 0 .84-.27 2.75 1.05A9.2 9.2 0 0 1 12 7.5c.83 0 1.67.12 2.45.34 1.9-1.32 2.74-1.05 2.74-1.05.55 1.4.2 2.44.1 2.7.64.72 1.03 1.64 1.03 2.76 0 3.93-2.34 4.78-4.57 5.03.37.33.7.97.7 1.96v2.9c0 .28.18.6.69.5A10.1 10.1 0 0 0 22 12.3C22 6.7 17.52 2 12 2Z"
              />
            </svg>
          </a>
        </div>
      </header>

      <section class="panel">
        <div class="panel-row">
          <label class="file-input button success">
            <input id="fileInput" type="file" accept="image/*,.heic,.heif" />
            <span>选择图片</span>
          </label>
          <div class="actions inline-actions">
            <button id="cropBtn" class="button primary">裁切并压缩</button>
            <button id="resetBtn" class="button danger">重置</button>
          </div>
          <div class="meta">
            <div id="fileInfo">未选择图片</div>
            <div id="outputInfo">导出尺寸与大小将在此显示</div>
          </div>
        </div>
      </section>

      <section class="workspace">
        <div class="preview-area">
          <div class="area-title">裁切预览</div>
          <div class="image-wrap drop-zone" id="dropZone">
            <img id="sourceImage" alt="" />
            <div
              id="floatingActions"
              class="floating-actions"
              role="group"
              aria-label="裁剪操作"
              aria-hidden="true"
            >
              <button id="floatingCropBtn" class="button primary" type="button">
                裁切
              </button>
              <a
                id="floatingDownloadBtn"
                class="button disabled"
                download
                aria-disabled="true"
                tabindex="-1"
              >
                下载
              </a>
            </div>
          </div>
        </div>

        <div class="preview-area">
          <div class="area-title">导出预览</div>
          <a id="downloadBtn" class="button disabled" download>下载 JPG</a>
          <div class="image-wrap output">
            <img id="outputImage" alt="" />
          </div>
        </div>
      </section>

      
    </main>

    <script src="./libs/libheif-bundle.js"></script>
    <script src="./libs/cropper.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
